<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Web - Street Fighter II</title>
    <style>
        /* Quitamos los márgenes para que el juego ocupe toda la pantalla */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #game-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <!-- Aquí aparecerá el juego -->
    <div id="game-container"></div>

    <script type="text/javascript">
        EJS_player = '#game-container';
        
        // Usamos el núcleo 'snes' para Super Nintendo / Super Famicom
        EJS_core = 'snes'; 
        
        EJS_gameName = 'Street Fighter II';
        EJS_color = '#d32f2f'; // Color de carga
        EJS_startOnLoaded = true; // El juego inicia solito
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
        
        // AQUÍ PONES EL NOMBRE DEL ARCHIVO DE TU JUEGO.
        // Asegúrate de que el nombre aquí sea EXACTAMENTE igual al archivo que subas.
        EJS_gameUrl = 'sf2.zip'; 
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
